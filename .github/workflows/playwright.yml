name: Playwright Tests
on:
  push:
    branches: [ main ]
    
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Playwright Browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

      - name: Run Tests
        run: mvn test
        continue-on-error: true # Чтобы отчет сгенерировался даже если тесты упали

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
          
      - name: Debug files
        run: |
          echo "Listing workspace:"
          ls -R

      - name: Check allure-history contents
        run: |
          echo "Allure history content:"
          ls -la allure-history
          echo "Recursive:"
          find allure-history -type f | head -20
          
      - name: Ensure allure-history is not empty
        run: |
          mkdir -p allure-history
          if [ -z "$(find allure-history -type f -print -quit)" ]; then
            echo "No report generated yet" > allure-history/index.html
          fi
          
      - name: Create gh-pages branch if not exists
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin gh-pages || git checkout --orphan gh-pages && git reset --hard && git commit --allow-empty -m "Init gh-pages" && git push origin gh-pages && git checkout -

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-history
          publish_branch: gh-pages
          force_orphan: true
